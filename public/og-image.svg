<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#12101a"/>
    </linearGradient>
    <!-- Glow blobs -->
    <radialGradient id="glow1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#863bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#863bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="250" cy="180" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="950" cy="450" rx="350" ry="280" fill="url(#glow2)"/>

  <!-- Logo: icon + wordmark -->
  <!-- Lightning bolt icon (scaled up from favicon, ~80px) -->
  <g transform="translate(96, 210) scale(1.65)">
    <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- Wordmark: KI-WERK | STADT BERLIN -->
  <!-- "KI-WERK" -->
  <text x="196" y="255" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="64" letter-spacing="-1" fill="white">KI-WERK</text>
  <!-- Orange vertical bar -->
  <rect x="556" y="202" width="8" height="72" rx="2" fill="#ff6b35"/>
  <!-- "STADT" -->
  <text x="576" y="255" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="64" letter-spacing="-1" fill="white">STADT</text>
  <!-- "BERLIN" smaller below -->
  <text x="196" y="300" font-family="'Space Grotesk', Arial, sans-serif" font-weight="400" font-size="28" letter-spacing="6" fill="#863bff">BERLIN</text>

  <!-- Divider -->
  <rect x="96" y="340" width="540" height="1" fill="white" opacity="0.12"/>

  <!-- Tagline -->
  <text x="96" y="390" font-family="Arial, sans-serif" font-size="28" fill="#a09ab8">Ein Kartenspiel über KI im öffentlichen Sektor.</text>
  <text x="96" y="428" font-family="Arial, sans-serif" font-size="28" fill="#a09ab8">Kombiniere Daten und Szenarien zu einer KI-Idee.</text>

  <!-- Footer -->
  <text x="96" y="558" font-family="Arial, sans-serif" font-size="20" fill="#5a5470">CityLAB Berlin · Technologiestiftung Berlin</text>

  <!-- Decorative card shapes on the right -->
  <g opacity="0.15">
    <rect x="810" y="80" width="200" height="280" rx="18" fill="none" stroke="#863bff" stroke-width="2" transform="rotate(-8 910 220)"/>
    <rect x="860" y="120" width="200" height="280" rx="18" fill="none" stroke="#ff6b35" stroke-width="2" transform="rotate(2 960 260)"/>
    <rect x="920" y="100" width="200" height="280" rx="18" fill="none" stroke="#47bfff" stroke-width="2" transform="rotate(12 1020 240)"/>
  </g>
</svg>
